services:
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - timer-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 5
      start_period: 30s

  gateway-server:
    build:
      context: .
      dockerfile: gateway-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - timer-net

  timer-service:
    build:
      context: .
      dockerfile: timer-service/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://rdb:5432/timer
      - SPRING_DATA_REDIS_HOST=imdb
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      rdb:
        condition: service_healthy
      imdb:
        condition: service_started
    networks:
      - timer-net

  realtime-service:
    build:
      context: .
      dockerfile: realtime-service/Dockerfile
    ports:
      - "5500:5500"
    environment:
      - SPRING_DATA_REDIS_HOST=imdb
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - FEIGN_CLIENT_TIMER-API_URL=http://timer-service:5000/api/v1
    depends_on:
      discovery-server:
        condition: service_healthy
      imdb:
        condition: service_started
      timer-service:
        condition: service_healthy
    networks:
      - timer-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      gateway-server:
        condition: service_healthy
    networks:
      - timer-net

  rdb:
    image: postgres:alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: timer
      POSTGRES_PASSWORD: timer1!
      POSTGRES_DB: timer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timer -d timer"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 10s
    networks:
      - timer-net

  imdb:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - timer-net

networks:
  timer-net:
    driver: bridge